<!DOCTYPE html>

<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Hostel Bites</title>


  <script>
async function checkAuth() {
  try {
    const res = await fetch("https://backendhb.onrender.com/api/auth/check", {
      credentials: "include"
    });

    if (!res.ok) {
      window.location.href = "admin.html";
    }
  } catch {
    window.location.href = "admin.html";
  }
}

checkAuth();
</script>
  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --orange: #ff6b00;
  --bg: #0a0a0b;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #f0ece6;
  --muted: #8a8680;
}

/* BODY */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* MAIN BOX */
.box {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 26px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* HEADING */
h2 {
  color: var(--orange);
  text-align: center;
}

/* ADMIN PANEL */
#adminPanel {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* 🔥 IMPORTANT FIX: HIDDEN CLASS */
.hidden {
  display: none !important;
}

/* FIELD GROUPS */
#addFields,
#updateFields {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* INPUTS */
input,
select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  outline: none;
  transition: 0.2s;
}
select {
  background-color: rgba(255,255,255,0.05) !important;
  color: var(--text) !important;
}

/* 🔥 FIX DROPDOWN OPTIONS */
select option {
  background-color: #1a1a1a;
  color: #ffffff;
}

/* For better visibility when opened */
select:focus option {
  background-color: #1a1a1a;
  color: #ffffff;
}

input::placeholder {
  color: #777;
}

input:focus,
select:focus {
  border-color: var(--orange);
  background: rgba(255,107,0,0.05);
  box-shadow: 0 0 0 2px rgba(255,107,0,0.15);
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

/* TARGET BUTTONS DIRECTLY (FIX BUG) */
button[onclick="submitData()"] {
  background: var(--orange);
  color: white;
}

button[onclick="submitData()"]:hover {
  background: #ff7f1a;
  transform: translateY(-1px);
}

button[onclick="goBack()"] {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text);
}

button[onclick="goBack()"]:hover {
  background: rgba(255,255,255,0.12);
}

/* MODE SELECT FIX */
.mode-select {
  display: flex;
  gap: 10px;
}

.mode-select label {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FIX RADIO STRUCTURE */
.mode-select label input {
  display: none;
}

.mode-select label:has(input:checked) {
  background: rgba(255,107,0,0.15);
  border-color: var(--orange);
  color: var(--orange);
}

/* MESSAGE */
#msg {
  text-align: center;
  font-size: 14px;
  color: #ff6b6b;
}

/* MOBILE */
@media (max-width: 480px) {
  .box {
    padding: 20px;
  }

  input,
  select,
  button {
    font-size: 14px;
  }
}
  </style>

</head>

<body>

  <div class="box">

      <div id="adminPanel">
        <h2>📦 Manage Products</h2>

        <!-- MODE -->

        <div class="mode-select">
          <label>
            <input type="radio" name="mode" value="add" onchange="switchMode()"> Add
          </label>
          <label>
            <input type="radio" name="mode" value="update" onchange="switchMode()"> Update
          </label>
        </div>

        <!-- COMMON PRODUCT SELECT -->

        <select id="productSelect" class="hidden"></select>

        <!-- ADD -->

        <div id="addFields" class="hidden">
          <input type="text" id="name" placeholder="Product Name">
          <input type="text" id="src" placeholder="Image URL">
          <input type="number" id="price" placeholder="Price">
          <input type="number" id="oprice" placeholder="Old Price">

          <!-- CATEGORY DROPDOWN -->

          <select id="cat">
            <option value="" selected>Select Category</option>
            <option>Instant</option>
            <option>Kurkure</option>
            <option>Chips</option>
            <option>Chocolate</option>
            <option>Biscuits</option>
            <option>Namkeen</option>
            <option>Drinks</option>
          </select>

          <input type="number" id="stockAdd" placeholder="Stock">
        </div>

        <!-- UPDATE -->

        <div id="updateFields" class="hidden">

          <select id="updateType" onchange="showUpdateInput()" class="hidden">
            <option value="" selected>Select field</option>
            <option value="name">Name</option>
            <option value="stock">Stock</option>
            <option value="price">Price</option>
            <option value="oprice">Old Price</option>
            <option value="src">Image</option>
            <option value="cat">Category</option>
          </select>

          <input type="text" id="updateValue" class="hidden">

        </div>

        <button onclick="submitData()">Submit</button>
        <button onclick="goBack()">⬅ Back</button>
      </div>

      <p id="msg"></p>

    </div>

  </div>


  <script src="js/mproduct.js"></script>

</body>

</html>
