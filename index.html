<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Bites</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff5eb;
    text-align: center;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header */
.header {
    background: #ff6a00;
    color: white;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* Main Section */
.container {
    flex: 1;
    margin-top: 100px;
}

h1 {
    color: #333;
}

p {
    color: #666;
    font-size: 18px;
}

/* Button */
.btn {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff6a00;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #e65c00;
}

/* Popup */
.popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: red;
    color: white;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

/* Footer */
.footer {
    background: #222;
    color: white;
    padding: 15px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="header">
    🍟 Hostel Bites
</div>

<div class="container">
    <h1>Welcome to Hostel Store</h1>
    <p>Snacks, Drinks & Midnight Cravings 😋</p>
    <p> Store is open only from <b>8 PM to 12 AM </b></p>

    <button class="btn" onclick="enterStore()">Enter Store</button>
</div>

<div id="popup" class="popup">
    Store is open only from 8 PM to 12 AM ⏰
</div>

<!-- Footer -->
<div class="footer">
    © 2026 Hostel Bites. All rights reserved.
</div>

<script>
function isStoreOpen() {
    let now = new Date();
    let hour = now.getHours();

    if (hour >= 20 || hour < 1) {
        return true;
    }
    return false;
}

//     } else {
//         let popup = document.getElementById("popup");
//         popup.style.display = "block";

//         setTimeout(() => {
//             popup.style.display = "none";
//         }, 3000);
//     }
// }


function enterStore() {
    if (isStoreOpen()) {
        sessionStorage.setItem("allowed", "true"); // 🔥 important
        window.location.href = "hostel_bites.html";
    } else {
        let popup = document.getElementById("popup");
        popup.style.display = "block";

        setTimeout(() => {
            popup.style.display = "none";
        }, 3000);
    }
}
</script>

</body>
</html>
