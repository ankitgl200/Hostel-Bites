<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Bites</title>

</head>

<style>
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background: #fff5eb;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
    }

    /* HEADER */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #ff6a00;
        color: white;
        padding: 14px 20px;
        font-size: 20px;
        font-weight: bold;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .header span {
        font-size: 20px;
    }

    .header img {
        height: 30px;
        vertical-align: middle;
    }

    .dev-btn {
        padding: 8px 14px;
        border: none;
        border-radius: 20px;
        background: white;
        color: #ff6a00;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* DEV INPUT BOX */
    .dev-box {
        display: none;
        background: #fff3e8;
        border-bottom: 1px solid #ffd4ab;
        padding: 12px 16px;
        gap: 10px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
    }

    .dev-box.visible {
        display: flex;
    }

    .dev-box input {
        flex: 1;
        min-width: 0;
        max-width: 280px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 15px;
    }

    .dev-box button {
        padding: 10px 18px;
        border: none;
        background: #ff6a00;
        color: white;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
        white-space: nowrap;
    }

    /* MAIN CONTAINER */
    .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 24px;
        gap: 12px;
    }

    .emoji-icon {
        font-size: 64px;
        line-height: 1;
        margin-bottom: 8px;
    }

    .emoji-icon img {
        width: 100px;
        height: 100px;
    }

    h1 {
        font-size: clamp(24px, 7vw, 36px);
        color: #222;
        line-height: 1.2;
    }

    .subtitle {
        font-size: clamp(15px, 4vw, 18px);
        color: #555;
    }

    .timing {
        font-size: clamp(14px, 3.5vw, 16px);
        color: #777;
    }

    .timing b {
        color: #ff6a00;
    }

    /* ENTER BUTTON */
    .btn {
        margin-top: 16px;
        padding: 16px 40px;
        font-size: clamp(15px, 4vw, 18px);
        border: none;
        border-radius: 50px;
        background: linear-gradient(45deg, #ff6a00, #ff8c42);
        color: white;
        cursor: pointer;
        box-shadow: 0 5px 18px rgba(255, 106, 0, 0.35);
        width: min(90%, 280px);
        font-weight: bold;
        letter-spacing: 0.3px;
        transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:active {
        transform: scale(0.97);
        box-shadow: 0 3px 10px rgba(255, 106, 0, 0.3);
    }

    /* POPUP */
    .popup {
        position: fixed;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        width: min(90%, 360px);
        background: #d32f2f;
        color: white;
        padding: 14px 20px;
        border-radius: 12px;
        text-align: center;
        font-size: 15px;
        display: none;
        z-index: 200;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    /* FOOTER */
    .footer {
        background: #222;
        color: #aaa;
        text-align: center;
        padding: 14px 16px;
        font-size: 13px;
    }

    /* Tablet+ adjustments */
    @media (min-width: 480px) {
        .header {
            font-size: 22px;
            padding: 16px 28px;
        }

        .emoji-icon {
            font-size: 72px;
        }
    }

    @media (min-width: 768px) {
        .header {
            font-size: 24px;
            padding: 18px 36px;
        }

        .container {
            padding: 60px 40px;
        }
    }
</style>


<body>

    <div class="header">
        <span><img src="hostelbites_wbg.png" alt="logo"> Hostel Bites</span>
        <button class="dev-btn" onclick="Contact()">Help</button>
        <button id="devButton" class="dev-btn" onclick="handleDevClick()">Dev Mode</button>
    </div>

    <div class="dev-box" id="devBox">
        <input type="password" id="devCode" placeholder="Enter Dev Code">
        <button onclick="checkDevCode()">Unlock</button>
    </div>

    <div class="container">
        <div class="emoji-icon"><img src="hostelbites_wbg.png" alt="logo"></div>
        <h1>Welcome to Hostel Bites</h1>
        <p class="subtitle">Snacks, Drinks &amp; Midnight Cravings 😋</p>
        <p class="timing">Open only from <b>8 PM to 12 AM</b></p>
        <p><i><b>“Real ones don’t just consume — they belong.”</b></i></p>
        <button id="adminPayBtn" class="btn" style="display:none;" onclick="openQRPage()">
            💰 Generate Payment QR
        </button>
        <!-- <button class="btn" onclick="alert('Store Closed due Lack of Stock')">Enter Store</button> -->
        <button class="btn" onclick="enterStore()">Enter Store</button>
        <button class="btn" onclick="downloadApp()">Download App</button>
    </div>

    <div id="popup" class="popup">
        ⏰ Store is open only from 8 PM to 12 AM
    </div>

    <div class="footer">
        © 2026 Hostel Bites | All rights reserved |
        Last Updated: 18-04-2026.
    </div>

    <script>
        function downloadApp() {
            window.location.href = "Hostel_bites.apk";
        }
        function openQRPage() {
            window.location.href = "payment.html";
        }

        window.onload = function () {

            // 🔥 Remove ONLY update flag (not dev)
            localStorage.removeItem("updateShown");

            if (!localStorage.getItem("updateShown")) {
                alert(`🔥 New Updates in Hostel Bites!

New Item:
→ New item available "Mountain Dew" @22.

Enjoy your snacks! 😋`);

                localStorage.setItem("updateShown", "true");
            }

            updateDevButton();
        };

        function Contact() {
            alert("For any help, contact us at:\n📧 8218325600, 9149020075\n");
        }


        function showDevInput() {
            let box = document.getElementById("devBox");
            box.classList.toggle("visible");
        }

        async function hashCode(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function checkDevCode() {
            let input = document.getElementById("devCode").value;
            let hashedInput = await hashCode(input);
            let correctHash = "dabf920f1e716a90dd51aab0e9604fc9bd1183a1791d737f86b5201190fe7798";

            if (hashedInput === correctHash) {
                localStorage.setItem("dev", "true");
                alert("Dev Mode Activated 🔓");
                updateDevButton();
            } else {
                alert("Wrong Code ❌");
            }
        }

        function updateDevButton() {
            let btn = document.getElementById("devButton");
            let adminBtn = document.getElementById("adminPayBtn");

            if (localStorage.getItem("dev") === "true") {
                btn.innerText = "Logout Dev";
                btn.onclick = logoutDev;

                // 🔥 SHOW ADMIN BUTTON
                if (adminBtn) adminBtn.style.display = "block";

            } else {
                btn.innerText = "Dev Mode";
                btn.onclick = handleDevClick;

                // 🔥 HIDE ADMIN BUTTON
                if (adminBtn) adminBtn.style.display = "none";
            }
        }

        function logoutDev() {
            localStorage.removeItem("dev");
            alert("Dev Mode Disabled 🔒");
            updateDevButton();
        }

        function handleDevClick() {
            showDevInput();
        }

        function isStoreOpen() {
            let devAccess = localStorage.getItem("dev") === "true";
            if (devAccess) return true;
            let hour = new Date().getHours();
            return hour >= 20 || hour < 0;
        }

        function enterStore() {
            if (isStoreOpen()) {
                localStorage.setItem("allowed", "true");
                window.location.href = "hostel_bites.html";
            } else {
                let popup = document.getElementById("popup");
                popup.style.display = "block";
                setTimeout(() => { popup.style.display = "none"; }, 3000);
            }
        }


    </script>

</body>

</html>
