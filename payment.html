<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel Bites Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            text-align: center;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #ff9900;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e68a00;
        }

        #qrBox {
            margin-top: 20px;
        }

        img {
            width: 200px;
            height: 200px;
        }

        .upi {
            margin-top: 10px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hostel Bites</h1>
    <p>Scan & Pay via UPI</p>

    <input type="number" id="amount" placeholder="Enter Amount (₹)">

    <br>
    <button onclick="generateQR()">Generate QR</button>

    <div id="qrBox"></div>

    <div class="upi">UPI ID: 9149020075@fam</div>
</div>

<script>
    function generateQR() {
        let amount = document.getElementById("amount").value;
        let upiID = "9149020075@fam";  // CHANGE THIS

        if (amount === "" || amount <= 0) {
            alert("Enter valid amount");
            return;
        }

        let upiLink = `upi://pay?pa=${upiID}&pn=Hostel Bites&am=${amount}&cu=INR`;

        let qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;

        document.getElementById("qrBox").innerHTML = `
            <img src="${qrURL}" alt="QR Code">
            <p>Amount: ₹${amount}</p>
        `;
    }
</script>

</body>
</html>
