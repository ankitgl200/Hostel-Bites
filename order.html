<!DOCTYPE html>

<html>
<head>
<title>Admin Orders - Hostel Bites</title>

<style>
body {
  font-family: Arial;
  background: #fff5eb;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #ff6a00;
}

#orders {
  max-width: 700px;
  margin: auto;
}

.order {
  background: white;
  margin: 15px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}

/* Header */
.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.order-name {
  font-weight: bold;
  font-size: 16px;
}

/* Status badge */
.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: white;
}

.pending { background: orange; }
.accepted { background: green; }
.rejected { background: red; }

/* Details */
.order-details {
  margin-top: 10px;
  font-size: 14px;
  color: #444;
}

/* Buttons */
.order-actions {
  margin-top: 12px;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  color: white;
  font-weight: bold;
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.accept { background: #28a745; }
.reject { background: #dc3545; }
.delete { background: #333; }

button:hover {
  opacity: 0.85;
}
</style>

</head>

<body>

<h2>📦 Admin Orders</h2>

<div id="orders"></div>

<script src="js/orders.js"></script>

</body>
</html>
