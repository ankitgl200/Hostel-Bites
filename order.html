<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Orders - Hostel Bites</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  background: #fff5eb;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #ff6a00;
}

#orders {
  max-width: 700px;
  margin: auto;
}

.order {
  background: white;
  margin: 15px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}

/* Header */
.order-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.order-name {
  font-weight: bold;
  font-size: 16px;
}

/* Status badge */
.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: white;
  white-space: nowrap;
}

.pending { background: orange; }
.accepted { background: green; }
.rejected { background: red; }

/* Details */
.order-details {
  margin-top: 10px;
  font-size: 14px;
  color: #444;
}

/* Buttons */
.order-actions {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button {
  flex: 1;
  min-width: 80px;
  padding: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  color: white;
  font-weight: bold;
}
button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.accept { background: #28a745; }
.reject { background: #dc3545; }
.delete { background: #333; }

button:hover {
  opacity: 0.85;
}

/* Mobile responsiveness */
@media (max-width: 480px) {
  body {
    padding: 12px;
  }

  h2 {
    font-size: 18px;
  }

  .order {
    padding: 12px;
    margin: 10px 0;
  }

  .order-name {
    font-size: 15px;
  }

  .order-details {
    font-size: 13px;
  }

  .order-actions {
    flex-direction: column;
  }

  button {
    width: 100%;
    padding: 10px;
    font-size: 14px;
  }
}
</style>

</head>

<body>

<h2>📦 Received Orders</h2>

<div id="orders"></div>

<script src="js/orders.js?v=2"></script>

</body>
</html>
