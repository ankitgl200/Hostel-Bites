<!DOCTYPE html>

<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Hostel Bites</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: #fff5eb;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h2 {
      color: #ff6a00;
      text-align: center;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    input,
    select,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #adminPanel {
  flex-direction: column;
  gap: 12px;
}

    button {
      background: #ff6a00;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .mode-select {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .mode-select label {
      flex: 1;
      background: #fff3e8;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
    }

    .mode-select input {
      display: none;
    }

    /* Mobile responsiveness */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .box {
        padding: 16px;
        border-radius: 10px;
      }

      h2 {
        font-size: 18px;
      }

      input,
      select,
      button {
        padding: 12px 10px;
        font-size: 15px;
      }

      .mode-select {
        gap: 8px;
      }

      .mode-select label {
        padding: 10px 6px;
        font-size: 14px;
      }
    }
  </style>

</head>

<body>

  <div class="box">

    <!-- LOGIN -->

    <div id="loginBox">
      <h2>🔐 Admin Login</h2>
      <input type="password" id="adminPass" placeholder="Enter Admin Password">
      <button onclick="login()">Login</button>
    </div>
    <div>


      <!-- ADMIN PANEL -->

      <div id="adminPanel" style="display:none;">

        <h2>⚙️ Admin Dashboard</h2>

        <button onclick="goto()">📦 Orders</button>
        <button onclick="gotoProducts()">🛒 Manage Products</button>
        <button onclick="gotoFeedbacks()">✍️ Feedback</button>
        <button onclick="logout()">🚪 Logout</button>

      </div>

      <p id="msg"></p>

    </div>

  </div>


  <script src="js/admin.js"></script>

</body>

</html>
