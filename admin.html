
<!DOCTYPE html>

<html>
<head>
<title>Admin Panel - Hostel Bites</title>

<style>
body {
  font-family: Arial;
  background: #fff5eb;
  padding: 20px;
}

h2 {
  color: #ff6a00;
  text-align: center;
}

.box {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #ff6a00;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.hidden { display:none; }

.mode-select {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.mode-select label {
  flex: 1;
  background: #fff3e8;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}
.mode-select input { display:none; }

</style>

</head>

<body>

<div class="box">

<!-- LOGIN -->

<div id="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="adminPass">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" class="hidden">
  <button onclick=  goto()>Orders</button>

<h2>📦 Manage Products</h2>

<!-- MODE -->

<div class="mode-select">
  <label>
    <input type="radio" name="mode" value="add" onchange="switchMode()"> Add
  </label>
  <label>
    <input type="radio" name="mode" value="update" onchange="switchMode()"> Update
  </label>
</div>

<!-- COMMON PRODUCT SELECT -->

<select id="productSelect" class="hidden"></select>

<!-- ADD -->

<div id="addFields" class="hidden">
  <input type="text" id="name" placeholder="Product Name">
  <input type="text" id="src" placeholder="Image URL">
  <input type="number" id="price" placeholder="Price">
  <input type="number" id="oprice" placeholder="Old Price">

  <!-- CATEGORY DROPDOWN -->

  <select id="cat">
    <option value="">Select Category</option>
    <option>Instant</option>
    <option>Kurkure</option>
    <option>Chips</option>
    <option>Chocolate</option>
    <option>Biscuits</option>
  </select>

  <input type="number" id="stockAdd" placeholder="Stock">
</div>

<!-- UPDATE -->

<div id="updateFields" class="hidden">

  <select id="updateType" onchange="showUpdateInput()" class="hidden">
    <option value="">Select field</option>
    <option value="stock">Stock</option>
    <option value="price">Price</option>
    <option value="oprice">Old Price</option>
    <option value="src">Image</option>
    <option value="cat">Category</option>
  </select>

  <input type="text" id="updateValue" class="hidden">

</div>

<button onclick="submitData()">Submit</button>

<p id="msg"></p>

</div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
