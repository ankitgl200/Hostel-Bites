<!DOCTYPE html>

<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Hostel Bites</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --orange: #ff6b00;
  --bg: #0a0a0b;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #f0ece6;
  --muted: #8a8680;
}

/* BODY */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* MAIN BOX */
.box {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 28px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 18px; /* 🔥 FIX: spacing between sections */
}

/* HEADINGS */
h2 {
  text-align: center;
  color: var(--orange);
  margin-bottom: 5px;
}

/* LOGIN + PANEL SECTIONS */
#loginBox,
#adminPanel {
  display: flex;
  flex-direction: column;
  gap: 12px; /* 🔥 FIX: spacing inside sections */
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  outline: none;
  transition: 0.2s;
}

input::placeholder {
  color: #777;
}

input:focus {
  border-color: var(--orange);
  background: rgba(255,107,0,0.05);
  box-shadow: 0 0 0 2px rgba(255,107,0,0.15);
}

/* BUTTON BASE */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

/* LOGIN BUTTON */
#loginBox button {
  background: var(--orange);
  color: white;
}

#loginBox button:hover {
  background: #ff7f1a;
  transform: translateY(-1px);
}

/* ADMIN PANEL BUTTONS */
#adminPanel button {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text);
}

#adminPanel button:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}
.loading {
  opacity: 0.7;
  pointer-events: none;
}

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  border-top: 2px solid transparent;
  border-radius: 50%;
  display: inline-block;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* MESSAGE */
#msg {
  text-align: center;
  font-size: 14px;
  color: #ff6b6b;
  margin-top: 5px;
}

/* MOBILE */
@media (max-width: 480px) {
  .box {
    padding: 20px;
    gap: 15px;
  }

  h2 {
    font-size: 18px;
  }

  input,
  button {
    font-size: 14px;
  }
}
  </style>

</head>

<body>

  <div class="box">

    <!-- LOGIN -->

    <div id="loginBox">
      <h2>🔐 Admin Login</h2>
      <input type="password" id="adminPass" placeholder="Enter Admin Password">
      <button id="loginBtn" onclick="login()">Login</button>
    </div>
    <div>


      <!-- ADMIN PANEL -->

      <div id="adminPanel" style="display:none;">

        <h2>⚙️ Admin Dashboard</h2>

        <button onclick="goto()">📦 Orders</button>
        <button onclick="gotoProducts()">🛒 Manage Products</button>
        <button onclick="gotoFeedbacks()">✍️ Feedback</button>
        <button onclick="logout()">🚪 Logout</button>

      </div>

      <p id="msg"></p>

    </div>

  </div>


  <script src="js/admin.js"></script>

</body>

</html>
